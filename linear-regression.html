<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linear Regression - Numerical Methods</title>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'DynaPuff', cursive, Arial, sans-serif;
            background: url('images/2.png') center center / cover no-repeat;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            min-width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h1 {
            color: #ab6d47;
            text-align: center;
            margin-bottom: 1.2rem;
            margin-top: 0;
            font-size: 2.7rem;
        }
        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: 0.3rem;
            color: #7c5c3e;
            text-align: center;
        }
        input, select, textarea {
            width: 100%;
            max-width: 320px;
            padding: 0.5rem;
            border-radius: 0.7rem;
            border: 1px solid #e0cfc2;
            margin-bottom: 0.7rem;
            font-size: 1rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
            font-family: 'DynaPuff', cursive, Arial, sans-serif;
        }
        button {
            width: 100%;
            max-width: 320px;
            padding: 0.8rem;
            border-radius: 999px;
            border: none;
            background: #ffd6b0;
            color: #ab6d47;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s, color 0.2s;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        button:hover {
            background: #ab6d47;
            color: #fff;
        }
        .error {
            color: #d9534f;
            margin-bottom: 0.7rem;
            font-size: 0.98rem;
            text-align: center;
        }
        .output {
            margin-top: 1.5rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 0.98rem;
            color: #ab6d47;
        }
        th, td {
            border: 1px solid #7c5c3e;
            padding: 0.8rem 0.5rem;
            text-align: center;
            color: #ab6d47;
        }
        th {
            background: #ffe5d0;
            color: #ab6d47;
        }
        main {
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 2.5rem;
            padding-bottom: 2.5rem;
        }
        .back-btn {
            max-width: 320px;
            margin-bottom: 1.5rem;
            background: #e8c4a0;
            font-size: 0.95rem;
        }
        .back-btn:hover {
            background: #7c5c3e;
        }
        .solution-box {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #ab6d47;
            border-radius: 0.7rem;
            padding: 1.2rem;
            margin: 1rem auto;
            max-width: 550px;
            color: #ab6d47;
            text-align: center;
        }
        .solution-box h3 {
            margin-top: 0;
            color: #7c5c3e;
        }
        .solution-box p {
            margin: 0.5rem 0;
            font-size: 0.95rem;
        }
        .equation-display {
            background: #fff8f0;
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1rem 0;
            font-weight: 700;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }
            input, textarea, button {
                max-width: 95vw;
            }
        }
    </style>
</head>
<body>
    <main>
        <button class="back-btn" onclick="window.location.href='methods-hub.html';">← Back to Methods</button>
        <h1>Linear Regression</h1>
        
        <label for="dataInput">Enter data (comma or space separated for pairs):<br><span style="font-size:0.8rem;margin-top:0.3rem;">Format: x₁,y₁ x₂,y₂ ... or one pair per line</span></label>
        <textarea id="dataInput" rows="6" placeholder="Enter X,Y pairs&#10;Example:&#10;1,2&#10;2,4&#10;3,6&#10;4,8"></textarea>
        
        <button id="solveBtn">Calculate Linear Regression</button>
        <div class="error" id="error"></div>
        <div class="output" id="output"></div>
    </main>

    <script>
        function linearRegression(data) {
            if (data.length < 2) {
                throw 'Need at least 2 data points.';
            }
            
            const n = data.length;
            
            // Calculate sums
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;
            for (const [x, y] of data) {
                sumX += x;
                sumY += y;
                sumXY += x * y;
                sumX2 += x * x;
                sumY2 += y * y;
            }
            
            // Calculate slope (m) and intercept (b)
            const denominator = n * sumX2 - sumX * sumX;
            if (Math.abs(denominator) < 1e-10) {
                throw 'Cannot calculate regression: divide by zero.';
            }
            
            const m = (n * sumXY - sumX * sumY) / denominator;
            const b = (sumY - m * sumX) / n;
            
            // Calculate R-squared
            const meanY = sumY / n;
            let ssRes = 0, ssTot = 0;
            for (const [x, y] of data) {
                const yPred = m * x + b;
                ssRes += (y - yPred) * (y - yPred);
                ssTot += (y - meanY) * (y - meanY);
            }
            const rSquared = 1 - (ssRes / ssTot);
            
            // Calculate predictions
            const predictions = data.map(([x, y]) => ({
                x,
                y,
                yPred: m * x + b,
                error: y - (m * x + b)
            }));
            
            return {
                slope: m,
                intercept: b,
                rSquared,
                predictions,
                equation: `y = ${m.toFixed(6)}x + ${b.toFixed(6)}`
            };
        }

        function parseData(input) {
            const data = [];
            
            // Split by lines or spaces
            const lines = input.trim().split(/[\n\s]+/).filter(l => l);
            
            for (const line of lines) {
                // Try comma-separated or space-separated
                let parts;
                if (line.includes(',')) {
                    parts = line.split(',');
                } else {
                    // If it's a single number sequence, we need to handle it differently
                    parts = line.split(/[\s,]+/);
                }
                
                if (parts.length >= 2) {
                    const x = parseFloat(parts[0]);
                    const y = parseFloat(parts[1]);
                    if (!isNaN(x) && !isNaN(y)) {
                        data.push([x, y]);
                    }
                }
            }
            
            return data;
        }

        document.getElementById('solveBtn').addEventListener('click', function() {
            const errorDiv = document.getElementById('error');
            const outputDiv = document.getElementById('output');
            errorDiv.textContent = '';
            outputDiv.innerHTML = '';
            
            try {
                const input = document.getElementById('dataInput').value.trim();
                if (!input) {
                    errorDiv.textContent = 'Please enter data points.';
                    return;
                }
                
                const data = parseData(input);
                if (data.length < 2) {
                    errorDiv.textContent = 'Please enter at least 2 valid data points in format: x,y';
                    return;
                }
                
                const result = linearRegression(data);
                
                let html = '<div class="solution-box">';
                html += '<h3>Regression Results</h3>';
                html += `<div class="equation-display">y = ${result.slope.toFixed(6)}x + ${result.intercept.toFixed(6)}</div>`;
                html += `<p><strong>Slope (m):</strong> ${result.slope.toFixed(8)}</p>`;
                html += `<p><strong>Intercept (b):</strong> ${result.intercept.toFixed(8)}</p>`;
                html += `<p><strong>R² (Coefficient of Determination):</strong> ${result.rSquared.toFixed(8)}</p>`;
                html += '</div>';
                
                // Create table with predictions
                html += '<table><tr><th>X</th><th>Y (Actual)</th><th>Y (Predicted)</th><th>Error</th></tr>';
                for (const pred of result.predictions) {
                    html += `<tr>
                        <td>${pred.x.toFixed(6)}</td>
                        <td>${pred.y.toFixed(6)}</td>
                        <td>${pred.yPred.toFixed(6)}</td>
                        <td>${pred.error.toFixed(6)}</td>
                    </tr>`;
                }
                html += '</table>';
                
                outputDiv.innerHTML = html;
            } catch (err) {
                errorDiv.textContent = 'Error: ' + err;
            }
        });
    </script>
</body>
</html>
